version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: imagylze-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  db:
    image: postgres:15-alpine
    container_name: imagylze-db
    environment:
      POSTGRES_DB: imagylze
      POSTGRES_USER: imagylze
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imagylze"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: imagylze-web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      SECRET_KEY: "your-secret-key-change-in-production"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DATABASE_URL: postgresql://imagylze:changeme@db:5432/imagylze
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - media_volume:/app/media
    development: true

  celery:
    build: .
    container_name: imagylze-celery
    command: celery -A imagylze worker -l info
    environment:
      DEBUG: "False"
      SECRET_KEY: "your-secret-key-change-in-production"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DATABASE_URL: postgresql://imagylze:changeme@db:5432/imagylze
    depends_on:
      - redis
      - db
      - web
    volumes:
      - .:/app
      - media_volume:/app/media

  celery-beat:
    build: .
    container_name: imagylze-celery-beat
    command: celery -A imagylze beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DEBUG: "False"
      SECRET_KEY: "your-secret-key-change-in-production"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DATABASE_URL: postgresql://imagylze:changeme@db:5432/imagylze
    depends_on:
      - redis
      - db
      - web
    volumes:
      - .:/app
      - media_volume:/app/media

volumes:
  redis_data:
  postgres_data:
  media_volume:
