# Development override - uses SQLite instead of PostgreSQL
version: '3.8'

services:
  web:
    environment:
      DEBUG: "True"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  celery:
    depends_on:
      - redis
      - web

  celery-beat:
    depends_on:
      - redis
      - web
